<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VibeLearn - 学习知识库</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-container">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-logo">Vibe<span class="dot">Learn</span></span>
    </div>

    <div class="sidebar-sections">
      <div class="sidebar-section">
        <div class="sidebar-section-title">分类目录</div>
        <ul class="category-list" id="categoryList"></ul>
      </div>

      <div class="sidebar-section">
        <div class="sidebar-section-title">标签云</div>
        <div class="tag-cloud" id="tagCloud"></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn" id="btnAdd" title="添加新知识片段">&#x2795; 添加</button>
      <button class="btn" id="btnExportJSON" title="导出全部数据">&#x1F4E4;</button>
      <button class="btn" id="btnImportJSON" title="导入数据">&#x1F4E5;</button>
      <button class="btn" id="btnResetCache" title="从 index.json 重新加载数据" style="font-size:10px;">&#x21BA; 刷新索引</button>
      <input type="file" id="fileImportInput" accept=".json" style="display:none;">
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content">
    <!-- 搜索栏 -->
    <header class="header">
      <div class="search-box">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" class="search-input" id="searchInput" placeholder="搜索知识片段...（标题、摘要、标签）">
      </div>
      <span class="search-count" id="searchCount"></span>
      <div class="view-tabs" id="viewTabs" style="display:none;">
        <button class="view-tab active" data-view="canvas">图表</button>
        <button class="view-tab" data-view="html">详情</button>
      </div>
    </header>

    <!-- 内容区域 -->
    <div class="content-area">
      <!-- 片段列表 -->
      <div class="snippet-list-panel">
        <div class="snippet-list" id="snippetList">
          <div class="empty-state">
            <div class="empty-state-icon">&#x1F4ED;</div>
            <div class="empty-state-text">加载中...</div>
          </div>
        </div>
      </div>

      <!-- 详情 / Canvas 面板 -->
      <div class="detail-panel">
        <div class="detail-header" id="detailHeader">
          <div class="detail-header-info">
            <h2>&nbsp;</h2>
          </div>
        </div>

        <!-- Canvas 图表视图 -->
        <div class="canvas-container" id="canvasContainer" style="display:none;">
          <canvas id="detailCanvas"></canvas>
          <div class="canvas-controls">
            <button class="btn btn-icon" id="btnFit" title="适应视图">&#x1F50D;</button>
            <button class="btn btn-icon" id="btnReset" title="重置视图">&#x21BA;</button>
            <button class="btn btn-icon" id="btnExport" title="导出图片">&#x1F4F7;</button>
          </div>
          <div class="canvas-legend">
            <span style="font-size:11px;color:var(--text-muted);">&#x1F6C8; 拖拽平移 · 滚轮缩放 · 双击适应 · 点击节点查看详解</span>
          </div>
        </div>

        <!-- 节点详情浮层 -->
        <div class="node-detail-panel" id="nodeDetailPanel">
          <button class="node-detail-close" id="nodeDetailClose">&times;</button>
          <div class="node-detail-content" id="nodeDetailContent"></div>
        </div>

        <!-- HTML 详情视图 -->
        <div class="detail-html-view" id="htmlView">
          <div class="empty-state">
            <div class="empty-state-icon">&#x1F4A1;</div>
            <div class="empty-state-text">选择一个知识片段查看详情</div>
            <div class="empty-state-hint">点击左侧列表中的条目开始浏览</div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Toast 容器 -->
<div class="toast-container"></div>
