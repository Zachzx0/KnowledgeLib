<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Unreal Engine 同步方案 · 可视化学习图谱</title>
<style>
  html,body{margin:0;padding:0;height:100%;overflow:hidden;background:#0b1020;color:#e8ecf7;font-family:"Segoe UI","Microsoft YaHei",sans-serif;}
  #hud{position:fixed;top:0;left:0;right:0;padding:10px 16px;background:linear-gradient(180deg,rgba(11,16,32,0.95),rgba(11,16,32,0.7));z-index:10;display:flex;gap:8px;flex-wrap:wrap;align-items:center;border-bottom:1px solid #22305c;}
  #hud .title{font-size:16px;font-weight:600;color:#7ee0ff;margin-right:12px;letter-spacing:1px;}
  #hud button{background:#182448;color:#cfe0ff;border:1px solid #2b3f7a;padding:6px 12px;border-radius:6px;cursor:pointer;font-size:13px;transition:.15s;}
  #hud button:hover{background:#243668;border-color:#4a68b3;}
  #hud button.active{background:#2f4dbf;border-color:#7ea6ff;color:#fff;box-shadow:0 0 12px rgba(126,166,255,.5);}
  #hud .sep{width:1px;height:20px;background:#2b3f7a;margin:0 4px;}
  #hud .hint{margin-left:auto;font-size:12px;color:#9db4d8;}
  #canvas{position:absolute;top:0;left:0;width:100%;height:100%;display:block;cursor:grab;}
  #canvas:active{cursor:grabbing;}
  #detail{position:fixed;right:0;top:52px;bottom:0;width:420px;background:rgba(15,22,44,0.96);border-left:1px solid #22305c;padding:18px 20px;overflow-y:auto;box-shadow:-8px 0 24px rgba(0,0,0,.4);transform:translateX(100%);transition:transform .25s;z-index:9;backdrop-filter:blur(8px);}
  #detail.show{transform:translateX(0);}
  #detail h2{margin:0 0 8px 0;color:#7ee0ff;font-size:18px;border-bottom:1px solid #22305c;padding-bottom:8px;}
  #detail h3{color:#ffd08a;font-size:14px;margin:14px 0 6px 0;}
  #detail p, #detail li{font-size:13px;line-height:1.7;color:#c8d3ec;}
  #detail code{background:#0b1428;color:#8affc1;padding:2px 6px;border-radius:3px;font-size:12px;font-family:Consolas,monospace;}
  #detail .path{color:#89b0ff;font-size:11px;font-family:Consolas,monospace;word-break:break-all;background:#0a1226;padding:4px 6px;border-radius:3px;display:inline-block;margin:2px 0;}
  #detail .close{position:absolute;top:12px;right:14px;background:#2f4dbf;color:#fff;border:0;width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:14px;line-height:1;}
  #legend{position:fixed;left:12px;bottom:12px;background:rgba(15,22,44,0.9);border:1px solid #22305c;border-radius:8px;padding:10px 14px;font-size:12px;z-index:8;}
  #legend .row{display:flex;align-items:center;margin:4px 0;}
  #legend .box{width:14px;height:14px;border-radius:3px;margin-right:8px;}
  #minimap{position:fixed;right:12px;bottom:12px;width:180px;height:120px;background:rgba(15,22,44,0.85);border:1px solid #22305c;border-radius:6px;z-index:8;}
</style>
</head>
<body>

<div id="hud">
  <span class="title">🎮 UE Networking · 学习图谱</span>
  <button data-view="overview" class="active">总览对比</button>
  <button data-view="native">① 原生同步</button>
  <button data-view="repgraph">② ReplicationGraph</button>
  <button data-view="iris">③ Iris</button>
  <button data-view="rpc">RPC 数据流</button>
  <button data-view="proprep">属性同步流</button>
  <div class="sep"></div>
  <button data-view="seq_proprep">🕐 时序·属性同步</button>
  <button data-view="seq_rpc">🕐 时序·RPC 三方向</button>
  <button data-view="seq_move">🕐 时序·移动预测/修正</button>
  <div class="sep"></div>
  <button id="btnFit">🔍 适应视图</button>
  <button id="btnReset">↺ 重置</button>
  <span class="hint">💡 拖拽平移 · 滚轮缩放 · 点击节点查看细节</span>
</div>

<canvas id="canvas"></canvas>
<canvas id="minimap"></canvas>

<div id="legend">

  <div class="row"><div class="box" style="background:#4d8f9c"></div>RepGraph 专属</div>
</div>

<div id="detail">
  <button class="close" onclick="hideDetail()">×</button>
  <div id="detailContent"></div>
</div>

const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');

let W=0,H=0;
function resize(){
  W = canvas.width = window.innerWidth * devicePixelRatio;
  H = canvas.height = window.innerHeight * devicePixelRatio;
  canvas.style.width = window.innerWidth+'px';
  canvas.style.height = window.innerHeight+'px';
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  draw();
}
window.addEventListener('resize', resize);

        desc:'对每个连接：<br>1. 调 <code>Actor->IsNetRelevantFor(ViewerPawn, ViewerLoc)</code> 剔除不相关<br>2. 计算优先级 = <code>NetPriority × TimeSinceLast × 距离衰减</code><br>3. 按优先级排序<br>4. 按带宽预算截取前 K 个'}

        desc:'流程：<br>1. 首次 → 序列化 Actor 类 GUID + Location（生成通道）<br>2. 收集 Actor 及其所有 <code>ReplicatedSubObjects</code><br>3. 每个 UObject 一次 <code>FObjectReplicator::ReplicateProperties</code><br>4. 结果拼进一个 Bunch → SendBunch'}

        desc:'每个 UObject 的 <code>FObjectReplicator</code> 保存一份 <code>FRepShadowDataBuffer</code>——上次成功发送的所有属性值副本。<br><br>每帧 diff：逐 <code>FRepLayoutCmd</code> 比对当前值 vs Shadow → 生成 <code>ChangedPropertyTracker</code>（存 dirty handle 列表）。<br><br>⚠️ 这是原生方案<b>最贵的一步</b>——O(属性数)。Iris 的 Push Model 就是为消灭它。'}

        desc:'客户端属性写入后，若声明了 <code>ReplicatedUsing=OnRep_HP</code>，会调 <code>OnRep_HP()</code>。<br><br>⚠️ 一个坑：即使值和之前一样也会触发（除非用 <code>REPNOTIFY_OnChanged</code>）；OnRep 参数可拿到旧值。'}

      detail:{h:'为什么这样设计',src:'',

/* ========== 视图管理 ========== */
let currentView = 'overview';
let cam = { x:0, y:0, s:1 };

function setView(name){
  currentView = name;
  document.querySelectorAll('#hud button[data-view]').forEach(b=>b.classList.toggle('active', b.dataset.view===name));
  hideDetail();
  fitView();
}

function fitView(){
  const view = VIEWS[currentView];
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;
  if(view.type==='sequence'){
    const sy = view.yScale || 1;
    for(const l of view.lanes){
      minX=Math.min(minX, l.x-160); maxX=Math.max(maxX, l.x+160);
    }
    minY = -30*sy;
    maxY = 60*sy;
    for(const m of view.messages) maxY=Math.max(maxY, m.y*sy+80*sy);
  } else {
    for(const n of view.nodes){
      minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
      maxX=Math.max(maxX,n.x+n.w); maxY=Math.max(maxY,n.y+n.h);
    }
  }
  const pad=80;
  const cw=window.innerWidth, ch=window.innerHeight-52;
  const sx=(cw-pad*2)/(maxX-minX), sy=(ch-pad*2)/(maxY-minY);
  cam.s = Math.min(sx,sy,1.6);
  cam.x = (cw - (maxX-minX)*cam.s)/2 - minX*cam.s;
  cam.y = 52 + (ch - (maxY-minY)*cam.s)/2 - minY*cam.s;
  draw();
}
function resetCam(){cam={x:0,y:52,s:1};draw();}

/* ========== 绘制 ========== */
function drawNode(n){
  const x=n.x*cam.s+cam.x, y=n.y*cam.s+cam.y, w=n.w*cam.s, h=n.h*cam.s;
  // 阴影
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(x+3,y+4,w,h);
  // 主体
  ctx.fillStyle=n.color;
  ctx.fillRect(x,y,w,h);
  // 高光边
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.strokeRect(x,y,w,h);
  // 文本
  const fs = Math.max(10, 13*cam.s);
  ctx.fillStyle='#fff';
  ctx.font=`600 ${fs}px "Segoe UI","Microsoft YaHei"`;
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const lines = n.label.split('\n');
  const lh = fs * 1.25;
  const total = lh*lines.length;
  lines.forEach((ln,i)=>{
    ctx.fillText(ln, x+w/2, y+h/2 - total/2 + lh*(i+0.5));
  });
}

function drawEdge(a,b){
  // 从 a 中心指向 b 中心，命中边框
  const ax=a.x+a.w/2, ay=a.y+a.h/2;
  const bx=b.x+b.w/2, by=b.y+b.h/2;
  // 计算与目标矩形的交点
  const [ex,ey] = clipToRect(bx,by,ax,ay,b);
  const [sx,sy] = clipToRect(ax,ay,bx,by,a);
  const X1=sx*cam.s+cam.x, Y1=sy*cam.s+cam.y;
  const X2=ex*cam.s+cam.x, Y2=ey*cam.s+cam.y;

  ctx.strokeStyle='rgba(140,180,255,0.55)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(X1,Y1);
  // 贝塞尔更好看
  const midY=(Y1+Y2)/2;
  ctx.bezierCurveTo(X1, midY, X2, midY, X2, Y2);
  ctx.stroke();
  // 箭头
  const angle=Math.atan2(Y2-midY, X2-X2+0.001);
  const ah=8;
  ctx.fillStyle='rgba(140,180,255,0.85)';
  ctx.beginPath();
  const dir=Math.atan2(Y2 - (Y1+Y2)/2, X2-X2+0.001)||Math.atan2(Y2-Y1,X2-X1);
  const dx=X2-X1, dy=Y2-Y1;
  const len=Math.hypot(dx,dy)||1;
  const ux=dx/len, uy=dy/len;
  ctx.moveTo(X2,Y2);
  ctx.lineTo(X2 - ux*ah - uy*ah/2, Y2 - uy*ah + ux*ah/2);
  ctx.lineTo(X2 - ux*ah + uy*ah/2, Y2 - uy*ah - ux*ah/2);
  ctx.closePath();
  ctx.fill();
}

function clipToRect(fromX, fromY, toX, toY, rect){
  // 从 (fromX,fromY) 向 (toX,toY) 方向，与 rect 边界的交点
  const cx=rect.x+rect.w/2, cy=rect.y+rect.h/2;
  const dx=fromX-cx, dy=fromY-cy;
  const hw=rect.w/2, hh=rect.h/2;
  const scale = Math.min(hw/Math.abs(dx||1e-6), hh/Math.abs(dy||1e-6));
  return [cx+dx*scale, cy+dy*scale];
}

function drawTitle(){
  ctx.save();
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  const t = VIEWS[currentView].title;
  ctx.font='600 20px "Segoe UI","Microsoft YaHei"';
  ctx.fillStyle='rgba(126,224,255,0.95)';
  ctx.textAlign='center';
  ctx.fillText(t, window.innerWidth/2, 78);
  ctx.restore();
}

function draw(){
  ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  ctx.fillStyle='#0b1020';
  ctx.fillRect(0,0,window.innerWidth,window.innerHeight);
  // 网格
  ctx.strokeStyle='rgba(70,90,140,0.10)';
  ctx.lineWidth=1;
  const step=50*cam.s;
  const ox=cam.x % step, oy=cam.y % step;
  for(let x=ox;x<window.innerWidth;x+=step){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,window.innerHeight);ctx.stroke();}
  for(let y=oy;y<window.innerHeight;y+=step){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(window.innerWidth,y);ctx.stroke();}

  const view = VIEWS[currentView];
  if(view.type === 'sequence'){
    drawSequence(view);
  } else {
    const map = Object.fromEntries(view.nodes.map(n=>[n.id,n]));
    // edges 先画
    for(const [aId,bId] of view.edges){
      const a=map[aId], b=map[bId];
      if(a&&b) drawEdge(a,b);
    }
    // nodes 后画
    for(const n of view.nodes) drawNode(n);
  }
  drawTitle();
  drawMinimap();
}

/* ========== 时序图专用绘制 ========== */
let seqLabelBoxes = []; // 每帧碰撞检测用
let seqYScale = 1;       // 每个视图的 y 间距缩放因子
function drawSequence(view){
  const laneMap = Object.fromEntries(view.lanes.map(l=>[l.id,l]));
  seqLabelBoxes = []; // 重置
  seqYScale = view.yScale || 1;

  // 计算全局 y 范围
  let yMin=20, yMax=60;
  for(const m of view.messages) yMax=Math.max(yMax, m.y*seqYScale+40);

  // ---- 1. 绘制泳道生命线 ----
  for(const l of view.lanes){
    const X = l.x*cam.s + cam.x;
    const YTop = yMin*cam.s + cam.y;
    const YBottom = yMax*cam.s + cam.y;

    // 生命线（虚线）
    ctx.strokeStyle = 'rgba(140,180,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8,6]);
    ctx.beginPath();
    ctx.moveTo(X, YTop+30);
    ctx.lineTo(X, YBottom);
    ctx.stroke();
    ctx.setLineDash([]);

    // 泳道标题框
    const boxW = 260*cam.s, boxH = 44*cam.s;
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(X - boxW/2 + 3, YTop + 4, boxW, boxH);
    ctx.fillStyle = l.color;
    ctx.fillRect(X - boxW/2, YTop, boxW, boxH);
    ctx.strokeStyle='rgba(255,255,255,0.25)';
    ctx.lineWidth=1;
    ctx.strokeRect(X - boxW/2, YTop, boxW, boxH);

    ctx.fillStyle='#fff';
    ctx.font=`600 ${Math.max(11, 14*cam.s)}px "Segoe UI","Microsoft YaHei"`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(l.label, X, YTop + boxH/2);
  }

  // ---- 2. 绘制消息（按顺序，先画箭头再画文字气泡）----
  for(let i=0; i<view.messages.length; i++){
    const m = view.messages[i];
    const from = laneMap[m.from], to = laneMap[m.to];
    if(!from || !to) continue;
    drawSequenceMessage(m, from, to, i);
  }
}

function drawSequenceMessage(m, from, to, idx){
  const Y = (m.y * seqYScale)*cam.s + cam.y;
  const XF = from.x*cam.s + cam.x;
  const XT = to.x*cam.s + cam.x;

  if(m.kind === 'note'){
    // 说明节点：横跨所有泳道的浅色带
    const laneXs = Object.values(seqLaneXs()); // 返回排序好的 X
    const left = Math.min(...laneXs) - 140*cam.s;
    const right = Math.max(...laneXs) + 140*cam.s;
    const H = 34*cam.s;
    ctx.fillStyle='rgba(196,127,61,0.22)';
    ctx.fillRect(left, Y-H/2, right-left, H);
    ctx.strokeStyle='rgba(255,208,138,0.7)';
    ctx.lineWidth=1;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(left, Y-H/2, right-left, H);
    ctx.setLineDash([]);

    ctx.fillStyle='#ffd08a';
    ctx.font=`600 ${Math.max(12, 14*cam.s)}px "Segoe UI","Microsoft YaHei"`;
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillText(m.label, (left+right)/2, Y);
    // 记录点击区域 + 占用矩形（仅文字区域，避免全宽占位导致相邻 label 被迫上移）
    ctx.font=`600 ${Math.max(12, 14*cam.s)}px "Segoe UI","Microsoft YaHei"`;
    const noteTW = ctx.measureText(m.label).width + 20;
    const noteMidX = (left+right)/2;
    const noteHX = noteMidX - noteTW/2;
    const noteHY = Y - H/2;
    m._hitbox = {x:noteHX, y:noteHY, w:noteTW, h:H};
    seqLabelBoxes.push({x:noteHX, y:noteHY, w:noteTW, h:H});
    return;
  }

  if(m.kind === 'internal' || m.from === m.to){
    // 内部处理：泳道自循环圆弧
    const R = 20*cam.s;
    ctx.strokeStyle = 'rgba(120,140,200,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(XF + R + 4*cam.s, Y, R, Math.PI*0.6, Math.PI*1.4, true);
    ctx.stroke();

    // 箭头
    const arrX = XF + 6*cam.s, arrY = Y - 3*cam.s;
    ctx.fillStyle = 'rgba(120,140,200,0.9)';
    ctx.beginPath();
    ctx.moveTo(arrX, arrY);
    ctx.lineTo(arrX + 6*cam.s, arrY - 4*cam.s);
    ctx.lineTo(arrX + 6*cam.s, arrY + 4*cam.s);
    ctx.closePath();
    ctx.fill();

    // 文字气泡（右侧展开）
    drawMessageLabel(m, XF + 30*cam.s, Y, false);
    return;
  }

  // 跨泳道消息：直箭头
  const isReverse = XT < XF;
  const isReliable = m.label && m.label.includes('🔴');
  const strokeColor = isReliable ? 'rgba(200,80,80,0.85)' : 'rgba(126,166,255,0.85)';
  const fillColor = isReliable ? 'rgba(200,80,80,0.95)' : 'rgba(126,166,255,0.95)';

  ctx.strokeStyle = strokeColor;
  ctx.lineWidth = 2;
  if(m.dashed){ ctx.setLineDash([6,4]); }
  ctx.beginPath();
  ctx.moveTo(XF, Y);
  ctx.lineTo(XT, Y);
  ctx.stroke();
  ctx.setLineDash([]);

  // 箭头
  const ah = 10*cam.s;
  const dir = isReverse ? -1 : 1;
  ctx.fillStyle = fillColor;
  ctx.beginPath();
  ctx.moveTo(XT, Y);
  ctx.lineTo(XT - dir*ah, Y - ah*0.6);
  ctx.lineTo(XT - dir*ah, Y + ah*0.6);
  ctx.closePath();
  ctx.fill();

  // 文字气泡在中点
  drawMessageLabel(m, (XF+XT)/2, Y, true);
}

function drawMessageLabel(m, cx, cy, centered){
  const fs = Math.max(10, 12*cam.s);
  ctx.font = `500 ${fs}px "Segoe UI","Microsoft YaHei"`;
  const text = m.label || '';
  // 长文本自动换行（超过 46 字截断为两行）
  const maxCharsPerLine = 46;
  const lines = [];
  if(text.length > maxCharsPerLine){
    // 简单按字符数分：优先在标点/空格处断
    let cut = maxCharsPerLine;
    for(let i=maxCharsPerLine; i>maxCharsPerLine-15 && i<text.length; i++){
      const ch = text[i];
      if(ch===' '||ch==='('||ch==='→'||ch==='·'||ch===','||ch==='|'){ cut = i; break; }
    }
    lines.push(text.slice(0, cut).trim());
    lines.push(text.slice(cut).trim());
  } else {
    lines.push(text);
  }
  const maxW = Math.max(...lines.map(s=>ctx.measureText(s).width));
  const padX = 10, padY = 5;
  const lineH = fs + 3;
  const w = maxW + padX*2;
  const h = lineH*lines.length + padY*2 - 3;

  // 定位策略：
  // - centered（跨泳道消息）：气泡放箭头上方，避免遮挡箭头本身
  // - 非 centered（internal 自循环）：右侧展开
  let x, y;
  if(centered){
    x = cx - w/2;
    y = cy - h - 8*cam.s;  // 箭头上方 8px
  } else {
    x = cx;
    y = cy - h/2 - 4*cam.s;
  }

  // 碰撞检测：如与已有 label 重叠 → 上移；仍重叠 → 再上移
  let attempts = 0;
  while(attempts < 6){
    let overlap = false;
    for(const b of seqLabelBoxes){
      if(!(x+w < b.x-4 || x > b.x+b.w+4 || y+h < b.y-4 || y > b.y+b.h+4)){
        overlap = true; break;
      }
    }
    if(!overlap) break;
    y -= (h + 4);       // 整行往上挪
    attempts++;
  }

  // 若最终位置偏离原箭头较远，画一条细连线指示归属
  const arrowY = cy;
  if(centered && Math.abs((y+h/2) - arrowY) > h){
    ctx.strokeStyle = 'rgba(120,140,200,0.4)';
    ctx.lineWidth = 0.8;
    ctx.setLineDash([2,3]);
    ctx.beginPath();
    ctx.moveTo(cx, y+h);
    ctx.lineTo(cx, arrowY);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // 背景气泡
  ctx.fillStyle = 'rgba(15,22,44,0.94)';
  ctx.strokeStyle = 'rgba(120,140,200,0.55)';
  ctx.lineWidth = 1;
  roundRect(ctx, x, y, w, h, 4);
  ctx.fill();
  ctx.stroke();

  // 文字
  ctx.fillStyle = '#e8ecf7';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for(let i=0;i<lines.length;i++){
    ctx.fillText(lines[i], x + w/2, y + padY + lineH*i + lineH/2 - 1);
  }

  // 记录点击区域 + 占用矩形
  m._hitbox = {x, y, w, h};
  seqLabelBoxes.push({x, y, w, h});
}

function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

// 缓存当前 view 的 lane X 以便 note 消息横跨绘制
function seqLaneXs(){
  const view = VIEWS[currentView];
  if(!view || view.type !== 'sequence') return {};
  const out = {};
  for(const l of view.lanes) out[l.id] = l.x*cam.s + cam.x;
  return out;
}

function drawMinimap(){
  const w=180,h=120;
  mini.width=w*devicePixelRatio; mini.height=h*devicePixelRatio;
  mini.style.width=w+'px'; mini.style.height=h+'px';
  mctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);
  mctx.fillStyle='rgba(15,22,44,0.9)';
  mctx.fillRect(0,0,w,h);
  const view=VIEWS[currentView];
  let minX=1e9,minY=1e9,maxX=-1e9,maxY=-1e9;

  if(view.type === 'sequence'){
    const sy = view.yScale || 1;
    for(const l of view.lanes){
      minX=Math.min(minX, l.x-140); maxX=Math.max(maxX, l.x+140);
    }
    minY = 20*sy; maxY = 60*sy;
    for(const m of view.messages) maxY=Math.max(maxY, m.y*sy+40*sy);
    const bw=maxX-minX, bh=maxY-minY;
    const sc=Math.min((w-8)/bw,(h-8)/bh);
    const ox=4-minX*sc, oy=4-minY*sc;
    // 泳道生命线
    for(const l of view.lanes){
      mctx.strokeStyle=l.color;
      mctx.lineWidth=1.5;
      mctx.beginPath();
      mctx.moveTo(l.x*sc+ox, minY*sc+oy);
      mctx.lineTo(l.x*sc+ox, maxY*sc+oy);
      mctx.stroke();
    }
    // 消息横线
    for(const m of view.messages){
      const from = view.lanes.find(l=>l.id===m.from);
      const to = view.lanes.find(l=>l.id===m.to);
      if(!from || !to) continue;
      mctx.strokeStyle = m.kind==='note' ? 'rgba(255,208,138,0.6)' : 'rgba(126,166,255,0.6)';
      mctx.lineWidth=0.8;
      mctx.beginPath();
      mctx.moveTo(from.x*sc+ox, m.y*sy*sc+oy);
      mctx.lineTo(to.x*sc+ox, m.y*sy*sc+oy);
      mctx.stroke();
    }
    // 视口框
    const vx=(-cam.x)/cam.s*sc+ox;
    const vy=(-cam.y+52)/cam.s*sc+oy;
    const vw=window.innerWidth/cam.s*sc;
    const vh=(window.innerHeight-52)/cam.s*sc;
    mctx.strokeStyle='#7ee0ff';
    mctx.lineWidth=1.5;
    mctx.strokeRect(vx,vy,vw,vh);
    return;
  }

  for(const n of view.nodes){
    minX=Math.min(minX,n.x); minY=Math.min(minY,n.y);
    maxX=Math.max(maxX,n.x+n.w); maxY=Math.max(maxY,n.y+n.h);
  }
  const bw=maxX-minX, bh=maxY-minY;
  const sc=Math.min((w-8)/bw,(h-8)/bh);
  const ox=4-minX*sc, oy=4-minY*sc;
  for(const n of view.nodes){
    mctx.fillStyle=n.color;
    mctx.fillRect(n.x*sc+ox, n.y*sc+oy, Math.max(2,n.w*sc), Math.max(2,n.h*sc));
  }
  // 视口框
  const vx=(-cam.x)/cam.s*sc+ox;
  const vy=(-cam.y+52)/cam.s*sc+oy;
  const vw=window.innerWidth/cam.s*sc;
  const vh=(window.innerHeight-52)/cam.s*sc;
  mctx.strokeStyle='#7ee0ff';
  mctx.lineWidth=1.5;
  mctx.strokeRect(vx,vy,vw,vh);
}

/* ========== 交互：拖拽 + 缩放 ========== */
let drag=null;
canvas.addEventListener('mousedown',e=>{
  const n = pickNode(e.clientX, e.clientY);
  if(n){ showDetail(n); return; }
  drag={x:e.clientX,y:e.clientY,cx:cam.x,cy:cam.y};
});
window.addEventListener('mousemove',e=>{
  if(drag){
    cam.x = drag.cx + (e.clientX-drag.x);
    cam.y = drag.cy + (e.clientY-drag.y);
    draw();
  }
});
window.addEventListener('mouseup',()=>drag=null);
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor = e.deltaY<0 ? 1.15 : 1/1.15;
  const mx=e.clientX, my=e.clientY;
  // 保持鼠标下的世界点不变
  const wx=(mx-cam.x)/cam.s, wy=(my-cam.y)/cam.s;
  cam.s = Math.max(0.15, Math.min(4, cam.s*factor));
  cam.x = mx - wx*cam.s;
  cam.y = my - wy*cam.s;
  draw();
},{passive:false});

function pickNode(mx,my){
  const view=VIEWS[currentView];
  if(view.type === 'sequence'){
    // 时序图：命中 message 的 hitbox
    for(let i=view.messages.length-1; i>=0; i--){
      const m = view.messages[i];
      if(!m._hitbox) continue;
      const b = m._hitbox;
      if(mx>=b.x && mx<=b.x+b.w && my>=b.y && my<=b.y+b.h){
        // 构造和 flowchart 节点相同接口
        return { label: m.label, detail: m.detail || {h:m.label,desc:'',src:''} };
      }
    }
    return null;
  }
  for(let i=view.nodes.length-1;i>=0;i--){
    const n=view.nodes[i];
    const x=n.x*cam.s+cam.x, y=n.y*cam.s+cam.y, w=n.w*cam.s, h=n.h*cam.s;
    if(mx>=x && mx<=x+w && my>=y && my<=y+h) return n;
  }
  return null;
}

/* ========== 详情面板 ========== */
function showDetail(n){
  const d = n.detail || {h:n.label,desc:'', src:''};
  const html = `
    <h2>${d.h||n.label}</h2>
    ${d.src?`<h3>📁 源码位置</h3>${d.src.split('\n').map(s=>`<div class="path">${s}</div>`).join('')}`:''}
    <h3>💡 详解</h3>
    <p>${d.desc||'（无更多说明）'}</p>
  `;
  document.getElementById('detailContent').innerHTML=html;
  document.getElementById('detail').classList.add('show');
}
function hideDetail(){document.getElementById('detail').classList.remove('show');}

/* ========== HUD 按钮 ========== */
document.querySelectorAll('#hud button[data-view]').forEach(b=>{
  b.addEventListener('click',()=>setView(b.dataset.view));
});
document.getElementById('btnFit').addEventListener('click',fitView);
document.getElementById('btnReset').addEventListener('click',resetCam);

/* ========== 启动 ========== */
resize();
setView('overview');

</script>
